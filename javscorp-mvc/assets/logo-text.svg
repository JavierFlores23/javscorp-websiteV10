<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 36" fill="none">
  <!-- Coffee cup icon (minimalist) -->
  <g transform="translate(0, 4)">
    <!-- Cup body -->
    <path d="M4 4 L6 24 Q6 26 8 26 L18 26 Q20 26 20 24 L22 4 Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" fill="none"/>
    <!-- Handle -->
    <path d="M20 9 Q26 9 26 15 Q26 21 20 21" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none"/>
    <!-- Saucer -->
    <line x1="2" y1="27" x2="24" y2="27" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    <!-- Steam wisps -->
    <path d="M10 1 Q11.5 -1 10 -3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.6"/>
    <path d="M15 1 Q16.5 -1 15 -3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.6"/>
  </g>
  <!-- Brand text -->
  <text x="36" y="22" font-family="Georgia, 'Times New Roman', serif" font-size="16" font-weight="400" fill="currentColor" letter-spacing="0.5">Jav's Corp</text>
